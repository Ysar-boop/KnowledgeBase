<!DOCTYPE html>
<html>
<head>
<title>Quick Answer</title>

<style>
body {
    background: #0a0f2c;
    color: white;
    font-family: Arial;
    padding: 20px;
}

.box {
    max-width: 600px;
    margin: auto;
}

input {
    width: 100%;
    padding: 10px;
    background: #0f1a4d;
    border: 1px solid #00aaff;
    color: white;
}

.answer {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<div class="box">
    <h2>⚡ Quick Answer</h2>

    <input id="input" placeholder="Type question..." oninput="findAnswer()">

    <div id="result" class="answer"></div>
</div>

<script>

let data = [
    {
        keywords: ["price","cost","how much"],
        answer: "Our pricing depends on the service."
    },
    {
        keywords: ["location","where"],
        answer: "We operate online."
    }
];

function findAnswer(){
    let input = document.getElementById("input").value.toLowerCase();
    let result = document.getElementById("result");

    result.innerHTML = "";

    data.forEach(item => {
        let match = item.keywords.some(k => input.includes(k));
        if(match){
            result.innerHTML = item.answer;
        }
    });
}

</script>

</body>
</html>
