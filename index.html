<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Appoinment AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background: radial-gradient(circle at top, #0a0f1f, #000);
}

/* LOGIN */
#loginScreen{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.loginBox{
  background:rgba(0,0,0,0.8);
  padding:30px;
  border-radius:10px;
  box-shadow:0 0 20px red;
}
input{
  display:block;
  margin:10px 0;
  padding:10px;
  width:200px;
}

/* MAIN */
#app{display:none;}
header{
  text-align:center;
  font-size:28px;
  font-weight:bold;
  padding:15px;
  background:linear-gradient(90deg, red, blue);
}

.container{
  display:flex;
}

/* LEFT */
.left{
  width:70%;
  padding:15px;
}

/* RIGHT */
.right{
  width:30%;
  background:rgba(0,0,0,0.6);
  padding:10px;
}

/* PANELS */
.panel{
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin-bottom:15px;
  border-radius:8px;
}

/* EDITOR */
.editor{
  background:white;
  color:black;
  padding:8px;
  min-height:40px;
  border-radius:5px;
}

/* STICKY NOTES */
.notes{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.note{
  width:120px;
  min-height:100px;
  padding:10px;
  border-radius:8px;
  color:black;
  position:relative;
}

.icons{
  position:absolute;
  top:5px;
  right:5px;
}
.icons span{
  cursor:pointer;
  margin-left:5px;
}

/* COLORS */
.c1{background:#fffb7d;}
.c2{background:#ffadad;}
.c3{background:#caffbf;}
.c4{background:#9bf6ff;}
.c5{background:#ffc6ff;}

button{
  margin-top:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="loginBox">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- APP -->
<div id="app">
<header>Appoinment AI</header>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="panel">
<h3>Screenshot Panel</h3>
<input type="file" onchange="loadImage(event)">
<img id="preview" style="max-width:100%;">
</div>

<div class="panel">
<h3>Answers</h3>
<div id="answers"></div>
</div>

<div class="panel">
<h3>Manual Add (Q / Objection / Answer)</h3>
<div id="manual" class="editor" contenteditable></div>
<button onclick="saveManual()">Save</button>
<div id="manualList"></div>
</div>

<h2>Knowledge Base</h2>

<div class="panel">
<h3>Frequently Asked</h3>
<div id="faq"></div>
</div>

</div>

<!-- RIGHT PANEL -->
<div class="right">

<div class="panel">
<h3>Top Sticky Notes</h3>
<div id="inputTop" class="editor" contenteditable></div>
<button onclick="addNote('top')">Add</button>
<div id="topNotes" class="notes"></div>
</div>

<div class="panel">
<h3>Bottom Sticky Notes</h3>
<div id="inputBottom" class="editor" contenteditable></div>
<button onclick="addNote('bottom')">Add</button>
<div id="bottomNotes" class="notes"></div>
</div>

</div>

</div>
</div>

<script>

/* LOGIN */
function login(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="block";
}

/* IMAGE */
function loadImage(e){
  let img=document.getElementById("preview");
  img.src=URL.createObjectURL(e.target.files[0]);
}

/* MANUAL */
let manualData=JSON.parse(localStorage.getItem("manual")||"[]");

function saveManual(){
  let val=document.getElementById("manual").innerHTML;
  if(!val) return;
  manualData.push(val);
  localStorage.setItem("manual",JSON.stringify(manualData));
  renderManual();
  renderFAQ();
}

function renderManual(){
  let div=document.getElementById("manualList");
  div.innerHTML="";
  manualData.forEach((d,i)=>{
    div.innerHTML+=`
    <div class="panel">
      ${d}
      <span onclick="delManual(${i})">🗑</span>
    </div>`;
  });
}
function delManual(i){
  manualData.splice(i,1);
  localStorage.setItem("manual",JSON.stringify(manualData));
  renderManual();
}

/* FAQ AUTO */
function renderFAQ(){
  let f=document.getElementById("faq");
  f.innerHTML="";
  manualData.forEach((d,i)=>{
    f.innerHTML+=`
    <div class="panel">
      ${d}
      <span onclick="delManual(${i})">🗑</span>
    </div>`;
  });
}

/* STICKY */
let topNotes=JSON.parse(localStorage.getItem("topNotes")||"[]");
let bottomNotes=JSON.parse(localStorage.getItem("bottomNotes")||"[]");

function randomColor(){
  let c=["c1","c2","c3","c4","c5"];
  return c[Math.floor(Math.random()*c.length)];
}

function addNote(type){
  let input=document.getElementById(type==="top"?"inputTop":"inputBottom");
  let val=input.innerHTML;
  if(!val) return;

  let note={text:val,color:randomColor()};

  if(type==="top"){topNotes.push(note);}
  else{bottomNotes.push(note);}

  localStorage.setItem("topNotes",JSON.stringify(topNotes));
  localStorage.setItem("bottomNotes",JSON.stringify(bottomNotes));

  input.innerHTML="";
  renderNotes();
}

function renderNotes(){
  let t=document.getElementById("topNotes");
  let b=document.getElementById("bottomNotes");

  t.innerHTML="";
  b.innerHTML="";

  topNotes.forEach((n,i)=>{
    t.innerHTML+=createNote(n,i,"top");
  });

  bottomNotes.forEach((n,i)=>{
    b.innerHTML+=createNote(n,i,"bottom");
  });
}

function createNote(n,i,type){
  return `
  <div class="note ${n.color}">
    <div class="icons">
      <span onclick="saveNote('${type}',${i})">💾</span>
      <span onclick="delNote('${type}',${i})">🗑</span>
    </div>
    <div contenteditable oninput="editNote('${type}',${i},this)">
      ${n.text}
    </div>
  </div>`;
}

function editNote(type,i,el){
  if(type==="top"){topNotes[i].text=el.innerHTML;}
  else{bottomNotes[i].text=el.innerHTML;}
}

function saveNote(type,i){
  localStorage.setItem("topNotes",JSON.stringify(topNotes));
  localStorage.setItem("bottomNotes",JSON.stringify(bottomNotes));
}

function delNote(type,i){
  if(type==="top"){topNotes.splice(i,1);}
  else{bottomNotes.splice(i,1);}
  saveNote();
  renderNotes();
}

/* INIT */
renderManual();
renderFAQ();
renderNotes();

</script>

</body>
</html>
