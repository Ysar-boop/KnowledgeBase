<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Panels</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, sans-serif;
    display: flex;
    height: 100vh;
    background: #f4f4f9;
  }
  .panel {
    width: 50%;
    padding: 10px;
    box-sizing: border-box;
    overflow-y: auto;
    border-right: 1px solid #ddd;
    background: #fdfdfd;
  }
  .section {
    background: #fff;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  button {
    margin: 3px;
    padding: 5px 10px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-weight: 500;
  }
  .sticky-note {
    width: 150px;
    min-width: 100px;
    min-height: 100px;
    max-width: 300px;
    max-height: 300px;
    padding: 8px;
    margin: 5px;
    background: #fff8b0;
    border-radius: 6px;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    cursor: move;
    overflow: auto;
    resize: both;
  }
  .sticky-container {
    display: flex;
    flex-wrap: wrap;
  }
  input, textarea {
    width: calc(100% - 20px);
    margin-bottom: 5px;
    padding: 5px;
    font-family: inherit;
    font-size: 14px;
  }
  h3 {
    margin: 5px 0;
    font-size: 16px;
  }
  #screenshotBtn {
    background: #4CAF50;
    color: white;
  }
</style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="panel" id="leftPanel">
  <!-- Screenshot -->
  <div class="section">
    <button id="screenshotBtn">Take Screenshot</button>
  </div>

  <!-- Manual Questions -->
  <div class="section">
    <h3>Manual Questions / Objections</h3>
    <input type="text" id="manualQuestion" placeholder="Enter question or objection">
    <input type="text" id="manualAnswer" placeholder="Enter answer">
    <button onclick="addQuestion()">Add / Save</button>
  </div>

  <!-- Automatic Answers -->
  <div class="section">
    <h3>Automatic Answers</h3>
    <div id="autoAnswers" class="sticky-container"></div>
  </div>

  <!-- Options for Questions/Answers -->
  <div class="section">
    <h3>Options</h3>
    <button onclick="clearQuestions()">Clear All Questions</button>
  </div>

  <!-- Knowledge Base -->
  <div class="section">
    <h3>Knowledge Base</h3>
    <div id="knowledgeBase" class="sticky-container"></div>
  </div>

  <!-- Pre Questions/Answers -->
  <div class="section">
    <h3>Pre-Questions / Answers</h3>
    <div id="preQA" class="sticky-container"></div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="panel" id="rightPanel">
  <!-- Reminders -->
  <div class="section">
    <h3>Reminders</h3>
    <input type="text" id="reminderInput" placeholder="Enter reminder">
    <button onclick="addReminder()">Add Reminder</button>
    <div id="reminderNotes" class="sticky-container"></div>
  </div>

  <!-- Sticky Notes -->
  <div class="section">
    <h3>Sticky Notes</h3>
    <button onclick="createSticky('stickyNotes')">Add Note</button>
    <div id="stickyNotes" class="sticky-container"></div>
  </div>
</div>

<script>
  // Utility for creating sticky notes
  function makeSticky(containerId, content='', color='#fff8b0') {
    const container = document.getElementById(containerId);
    const note = document.createElement('div');
    note.className = 'sticky-note';
    note.contentEditable = true;
    note.style.background = color;
    note.innerText = content;
    note.onmousedown = dragMouseDown;
    container.appendChild(note);

    // Right-click to delete
    note.oncontextmenu = (e) => {
      e.preventDefault();
      container.removeChild(note);
    }
  }

  function createSticky(containerId) {
    makeSticky(containerId, 'New Note');
  }

  // Drag and drop
  let offsetX, offsetY, currentNote;
  function dragMouseDown(e) {
    if (!e.target.classList.contains('sticky-note')) return;
    currentNote = e.target;
    offsetX = e.clientX - currentNote.offsetLeft;
    offsetY = e.clientY - currentNote.offsetTop;
    document.onmousemove = elementDrag;
    document.onmouseup = stopDrag;
  }
  function elementDrag(e) {
    e.preventDefault();
    currentNote.style.position = 'absolute';
    currentNote.style.left = (e.clientX - offsetX) + 'px';
    currentNote.style.top = (e.clientY - offsetY) + 'px';
  }
  function stopDrag() {
    document.onmousemove = null;
    document.onmouseup = null;
  }

  // LEFT PANEL FUNCTIONALITY
  let questions = [];
  function addQuestion() {
    const qInput = document.getElementById('manualQuestion');
    const aInput = document.getElementById('manualAnswer');
    if (!qInput.value) return alert('Question required');
    const qa = { q: qInput.value, a: aInput.value };
    questions.push(qa);
    updateKnowledgeBase();
    updatePreQA();
    qInput.value=''; aInput.value='';
  }

  function updateKnowledgeBase() {
    const kb = document.getElementById('knowledgeBase');
    kb.innerHTML='';
    questions.forEach((qa,i)=>{
      makeSticky('knowledgeBase', `Q: ${qa.q}\nA: ${qa.a}`);
    });
  }

  function updatePreQA() {
    const pre = document.getElementById('preQA');
    pre.innerHTML='';
    const freq = questions.length;
    questions.forEach(qa=>{
      makeSticky('preQA', `Q: ${qa.q}\nA: ${qa.a}`);
    });
  }

  function clearQuestions() {
    questions=[];
    document.getElementById('knowledgeBase').innerHTML='';
    document.getElementById('preQA').innerHTML='';
  }

  // Automatic Answers (simple example: mirrors last answer added)
  function updateAutoAnswers() {
    const auto = document.getElementById('autoAnswers');
    auto.innerHTML='';
    if (questions.length>0) {
      makeSticky('autoAnswers', questions[questions.length-1].a || 'No answer yet');
    }
  }

  setInterval(updateAutoAnswers,1000); // update every second

  // RIGHT PANEL FUNCTIONALITY
  function addReminder() {
    const input = document.getElementById('reminderInput');
    if(!input.value) return;
    makeSticky('reminderNotes', input.value, '#d0f0c0');
    input.value='';
  }

  // Screenshot function for left panel
  document.getElementById('screenshotBtn').onclick = function(){
    html2canvas(document.getElementById('leftPanel')).then(canvas=>{
      const link = document.createElement('a');
      link.download = 'leftPanel.png';
      link.href = canvas.toDataURL();
      link.click();
    });
  }

</script>

<!-- Include html2canvas for screenshot -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
