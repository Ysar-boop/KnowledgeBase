<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment AI</title>
<style>
/* GLOBAL STYLES */
body, html {
  margin:0;
  padding:0;
  height:100%;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0a0f1f, #000);
  color:white;
  overflow:hidden;
}

/* LOGIN SCREEN */
#loginScreen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #0a0f1f, #000);
}
#loginCard {
  background:rgba(0,0,0,0.8);
  padding:30px;
  border-radius:15px;
  box-shadow:0 0 20px #00d4ff;
  text-align:center;
}
#loginCard input {
  width:200px;
  padding:8px;
  margin:10px 0;
  border-radius:5px;
  border:none;
}

/* MAIN CONTAINER */
#mainApp {
  display:flex;
  height:100%;
  width:100%;
  display:none;
}

/* PANELS */
.left {
  width:70%;
  padding:15px;
  overflow:auto;
}
.right {
  width:30%;
  padding:10px;
  overflow:auto;
  border-left:2px solid #00d4ff;
}

/* PANELS STYLE */
.panel {
  background:rgba(255,255,255,0.05);
  margin-bottom:15px;
  padding:10px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,212,255,0.2);
}

/* CARD / NOTE */
.card {
  background:#111;
  padding:10px;
  margin-top:10px;
  border-left:3px solid #00d4ff;
  position:relative;
}

/* ICONS */
.icons {
  position:absolute;
  right:5px;
  top:5px;
}
.icons span {
  cursor:pointer;
  margin-left:8px;
  font-size:16px;
}

/* EDITOR */
.editor {
  min-height:50px;
  padding:5px;
  background:#000;
  border:1px solid #333;
  margin-top:5px;
  color:white;
}

/* TOOLBAR */
.toolbar button {
  background:#222;
  color:white;
  margin-right:5px;
  cursor:pointer;
  padding:2px 6px;
  border-radius:3px;
}

/* HEADER */
h1 {
  text-align:center;
  color:#00d4ff;
  text-shadow:0 0 10px #00d4ff;
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div id="loginCard">
    <h2>Login</h2>
    <input id="username" placeholder="Username"><br>
    <input id="password" placeholder="Password" type="password"><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <div class="left">
    <h1>Appointment AI</h1>

    <div class="panel">
      <h3>Screenshot Input (Collapsible)</h3>
      <textarea id="screenshotInput" style="width:100%;height:80px;"></textarea>
      <button onclick="processText()">Analyze</button>
    </div>

    <div class="panel">
      <h3>Answer Output</h3>
      <div id="answerOutput"></div>
    </div>

    <div class="panel">
      <h3>Manual Add (Q / Objection / Answer)</h3>
      <div class="toolbar">
        <button onclick="format('bold')">B</button>
        <button onclick="format('italic')">I</button>
        <button onclick="format('underline')">U</button>
      </div>
      <div id="q" class="editor" contenteditable="true" placeholder="Question">Question</div>
      <div id="o" class="editor" contenteditable="true" placeholder="Objection">Objection</div>
      <div id="a" class="editor" contenteditable="true" placeholder="Answer">Answer</div>
      <button onclick="addEntry()">Add Entry</button>
      <div id="entries"></div>
    </div>

    <h2>Knowledge Base</h2>
    <div class="panel" id="faqPanel">
      <h3>Frequently Asked Questions</h3>
      <div id="faq"></div>
    </div>

  </div>

  <div class="right">
    <div class="panel">
      <h3>Sticky Notes / Reminders</h3>
      <div class="toolbar">
        <button onclick="format('bold')">B</button>
        <button onclick="format('italic')">I</button>
        <button onclick="format('underline')">U</button>
      </div>
      <div id="noteInput" class="editor" contenteditable="true" placeholder="Write note..."></div>
      <button onclick="addNote()">Add Note</button>
      <div id="notes"></div>
    </div>
  </div>
</div>

<script>
/* LOGIN */
function login(){
  let user = document.getElementById('username').value;
  let pass = document.getElementById('password').value;
  if(user && pass){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='flex';
    loadNotes();
    loadEntries();
  } else {
    alert('Enter username and password');
  }
}

/* FORMAT */
function format(cmd){
  document.execCommand(cmd,false,null);
}

/* =================================
   STICKY NOTES (Persistent + Full)
================================= */
let notesDB = JSON.parse(localStorage.getItem('notesDB')||'[]');

function renderNotes(){
  const container = document.getElementById('notes');
  container.innerHTML = '';
  notesDB.forEach((note,i)=>{
    const noteDiv = document.createElement('div');
    noteDiv.className='card';
    noteDiv.innerHTML = `
      <div class="icons">
        <span onclick="toggleEdit(${i})">✏</span>
        <span onclick="saveNote(${i})">💾</span>
        <span onclick="deleteNote(${i})">🗑</span>
        <span onclick="collapseNote(${i})">⬇</span>
      </div>
      <div class="toolbar">
        <button onclick="format('bold')">B</button>
        <button onclick="format('italic')">I</button>
        <button onclick="format('underline')">U</button>
      </div>
      <div class="editor noteText" contenteditable="true">${note}</div>
    `;
    container.appendChild(noteDiv);
  });
}

function addNote(){
  const text = document.getElementById('noteInput').innerHTML;
  if(!text.trim()) return;
  notesDB.push(text);
  localStorage.setItem('notesDB', JSON.stringify(notesDB));
  document.getElementById('noteInput').innerHTML='';
  renderNotes();
}
function toggleEdit(index){
  const editor = document.getElementById('notes').children[index].querySelector('.noteText');
  if(editor.getAttribute('contenteditable')==='true'){
    editor.setAttribute('contenteditable','false'); editor.style.opacity='0.7';
  } else {
    editor.setAttribute('contenteditable','true'); editor.style.opacity='1';
  }
}
function saveNote(index){
  const editor = document.getElementById('notes').children[index].querySelector('.noteText');
  notesDB[index] = editor.innerHTML;
  localStorage.setItem('notesDB', JSON.stringify(notesDB));
}
function deleteNote(index){ notesDB.splice(index,1); localStorage.setItem('notesDB', JSON.stringify(notesDB)); renderNotes(); }
function collapseNote(index){
  const editor = document.getElementById('notes').children[index].querySelector('.noteText');
  editor.style.display = editor.style.display==='none'?'block':'none';
}
function loadNotes(){ renderNotes(); }

/* =================================
   MANUAL ADD (Q/O/A)
================================= */
let db = JSON.parse(localStorage.getItem('manualDB')||'[]');
function addEntry(){
  let q = document.getElementById('q').innerHTML;
  let o = document.getElementById('o').innerHTML;
  let a = document.getElementById('a').innerHTML;
  if(!q.trim() && !o.trim() && !a.trim()) return;
  db.push({q,o,a});
  localStorage.setItem('manualDB', JSON.stringify(db));
  renderEntries();
  autoFAQ({q,o,a});
  document.getElementById('q').innerHTML='';
  document.getElementById('o').innerHTML='';
  document.getElementById('a').innerHTML='';
}
function renderEntries(){
  let html='';
  db.forEach((e,i)=>{
    html+=`
      <div class="card">
        <div class="icons">
          <span onclick="deleteEntry(${i})">🗑</span>
        </div>
        <b>Q:</b> ${e.q}<br>
        <b>O:</b> ${e.o}<br>
        <b>A:</b> ${e.a}
      </div>`;
  });
  document.getElementById('entries').innerHTML=html;
}
function deleteEntry(i){ db.splice(i,1); localStorage.setItem('manualDB', JSON.stringify(db)); renderEntries(); }
function loadEntries(){ renderEntries(); }

/* =================================
   FAQ AUTO
================================= */
function autoFAQ(entry){
  const faq = document.getElementById('faq');
  faq.innerHTML += `<div class="card"><b>Q:</b> ${entry.q}<br><b>A:</b> ${entry.a}</div>`;
}

/* =================================
   SCREENSHOT PROCESSING (Simple)
================================= */
function processText(){
  const input = document.getElementById('screenshotInput').value.toLowerCase();
  const found = db.find(e=> input.includes(e.q.toLowerCase()));
  document.getElementById('answerOutput').innerHTML=found?found.a:"No match found";
}
</script>
</body>
</html>
