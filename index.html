<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q&A System</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0a0f2c, #0f1a4d);
    color: white;
    display: flex;
    height: 100vh;
}

/* Layout */
.container {
    display: flex;
    width: 100%;
}

/* LEFT PANEL */
.left {
    width: 65%;
    padding: 10px;
    overflow-y: auto;
}

/* RIGHT PANEL */
.right {
    width: 35%;
    padding: 10px;
    border-left: 1px solid rgba(255,255,255,0.2);
    display: flex;
    flex-direction: column;
}

/* Panels */
.section {
    background: rgba(255,255,255,0.05);
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid rgba(0,150,255,0.3);
}

.header {
    padding: 10px;
    cursor: pointer;
    background: rgba(0,0,0,0.3);
}

.content {
    display: none;
    padding: 10px;
}

/* Inputs */
input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 5px;
    background: #0f1a4d;
    border: 1px solid #00aaff;
    color: white;
}

/* Buttons */
button {
    margin: 5px 0;
    padding: 5px;
    background: transparent;
    border: 1px solid #00aaff;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #00aaff;
}

/* Sticky Notes */
.note {
    position: absolute;
    background: #1e2a6d;
    padding: 10px;
    border-radius: 8px;
    cursor: move;
}

/* Reminder */
.reminder {
    background: rgba(255,255,255,0.1);
    padding: 5px;
    margin: 5px 0;
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left" id="leftPanel">

<!-- Screenshot -->
<div class="section">
<div class="header" onclick="toggle(this)">📸 Screenshot Options</div>
<div class="content">
<button onclick="capture('leftPanel')">Capture Left Panel</button>
</div>
</div>

<!-- Manual Q&A -->
<div class="section">
<div class="header" onclick="toggle(this)">🧠 Manual Questions</div>
<div class="content" id="qaList"></div>
</div>

<!-- Auto Answer -->
<div class="section">
<div class="header" onclick="toggle(this)">⚡ Automatic Answers</div>
<div class="content">
<input id="autoInput" placeholder="Type question..." oninput="autoAnswer()">
<div id="autoResult"></div>
</div>
</div>

<!-- Add Q&A -->
<div class="section">
<div class="header" onclick="toggle(this)">➕ Add Q&A</div>
<div class="content">
<input id="q" placeholder="Question">
<textarea id="a" placeholder="Answer"></textarea>
<input id="k" placeholder="Keywords (comma separated)">
<button onclick="addQA()">Save</button>
</div>
</div>

<!-- Knowledge -->
<div class="section">
<div class="header" onclick="toggle(this)">📚 Knowledge Base</div>
<div class="content" id="knowledge"></div>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<!-- Reminders -->
<div style="flex:1;">
<h3>📝 Reminders</h3>
<input id="remInput" placeholder="Add reminder">
<button onclick="addReminder()">Add</button>
<div id="remList"></div>
</div>

<!-- Sticky Notes -->
<div style="flex:1; position:relative;">
<h3>📌 Sticky Notes</h3>
<button onclick="addNote()">Add Note</button>
</div>

</div>

</div>

<script>

/* TOGGLE */
function toggle(el){
    let content = el.nextElementSibling;
    content.style.display = content.style.display === "block" ? "none" : "block";
}

/* STORAGE */
let data = JSON.parse(localStorage.getItem("data")) || {
    qa: [],
    knowledge: [
        {q:"price", a:"Our pricing depends on service.", k:["price","cost"]},
        {q:"location", a:"We operate online.", k:["location"]}
    ]
};

/* SAVE */
function save(){
    localStorage.setItem("data", JSON.stringify(data));
}

/* ADD QA */
function addQA(){
    let q = document.getElementById("q").value;
    let a = document.getElementById("a").value;
    let k = document.getElementById("k").value.split(",");

    data.qa.push({q,a,k});
    save();
    renderQA();
}

/* RENDER QA */
function renderQA(){
    let container = document.getElementById("qaList");
    container.innerHTML = "";

    data.qa.forEach((item,i)=>{
        let div = document.createElement("div");
        div.innerHTML = `
            <b>${item.q}</b>
            <p>${item.a}</p>
            <button onclick="deleteQA(${i})">Delete</button>
        `;
        container.appendChild(div);
    });
}

/* DELETE */
function deleteQA(i){
    data.qa.splice(i,1);
    save();
    renderQA();
}

/* AUTO ANSWER */
function autoAnswer(){
    let input = document.getElementById("autoInput").value.toLowerCase();
    let result = document.getElementById("autoResult");
    result.innerHTML = "";

    let all = [...data.qa, ...data.knowledge];

    all.forEach(item=>{
        let match = item.k.some(k=>input.includes(k));
        if(match){
            result.innerHTML += `<p><b>Answer:</b> ${item.a}</p>`;
        }
    });
}

/* RENDER KNOWLEDGE */
function renderKnowledge(){
    let container = document.getElementById("knowledge");
    container.innerHTML = "";

    data.knowledge.forEach(item=>{
        let div = document.createElement("div");
        div.innerHTML = `<b>${item.q}</b><p>${item.a}</p>`;
        container.appendChild(div);
    });
}

/* REMINDERS */
function addReminder(){
    let val = document.getElementById("remInput").value;
    let div = document.createElement("div");
    div.className="reminder";
    div.textContent = val;
    document.getElementById("remList").appendChild(div);
}

/* STICKY NOTES */
function addNote(){
    let note = document.createElement("div");
    note.className="note";
    note.contentEditable = true;
    note.innerText="Note...";
    note.style.top="100px";
    note.style.left="70%";

    document.body.appendChild(note);

    note.onmousedown = function(e){
        let shiftX = e.clientX - note.getBoundingClientRect().left;
        let shiftY = e.clientY - note.getBoundingClientRect().top;

        function moveAt(pageX, pageY){
            note.style.left = pageX - shiftX + 'px';
            note.style.top = pageY - shiftY + 'px';
        }

        function onMouseMove(e){
            moveAt(e.pageX, e.pageY);
        }

        document.addEventListener('mousemove', onMouseMove);

        note.onmouseup = function(){
            document.removeEventListener('mousemove', onMouseMove);
        };
    };
}

/* SCREENSHOT */
function capture(id){
    html2canvas(document.getElementById(id)).then(canvas=>{
        let link = document.createElement("a");
        link.download = "screenshot.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

/* INIT */
renderQA();
renderKnowledge();

</script>

</body>
</html>
