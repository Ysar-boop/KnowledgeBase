<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment AI - Futuristic</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#0b0b0b;
  color:#e0e0e0;
}
.container { padding:20px; }
h1 {
  text-align:center;
  color:#ff0033;
  text-shadow:0 0 10px #ff0033;
}

.main { display:flex; gap:15px; }

/* Panels */
.panel {
  background:#1e1e1e;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 0 10px rgba(0,255,255,0.3);
}
.panel h2 {
  color:#00ffff;
}

/* Layout */
.left { flex:3; }
.right { flex:1; }

/* Lists */
ul { list-style:none; padding:0; }
li {
  background:#2b2b2b;
  margin:5px 0;
  padding:5px 10px;
  border-left:3px solid red;
  display:flex;
  justify-content:space-between;
}

/* Icons */
.icons { display:flex; gap:5px; }
.icon { cursor:pointer; }

/* Sticky Notes */
.note {
  padding:10px;
  border-radius:8px;
  margin:5px 0;
  color:#000;
  position:relative;
}

/* Toolbar */
.toolbar {
  display:flex;
  gap:5px;
  margin-bottom:5px;
}
.toolbar button {
  font-size:12px;
  padding:3px 6px;
}
</style>
</head>

<body>
<div class="container">

<h1>Appointment AI</h1>

<div class="main">

<!-- LEFT -->
<div class="left">

<div class="panel">
<h2>Manual Questions</h2>
<ul id="questions"></ul>
<input id="qInput" placeholder="Add question">
<button onclick="addQuestion()">Add</button>
</div>

<div class="panel">
<h2>Frequently Asked Questions</h2>
<ul id="faq"></ul>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="panel">
<h2>Sticky Notes</h2>
<div id="notes"></div>
<textarea id="noteInput"></textarea>
<button onclick="addNote()">Add Note</button>
</div>

<div class="panel">
<h2>Reminders</h2>
<div id="reminders"></div>
<textarea id="reminderInput"></textarea>
<button onclick="addReminder()">Add Reminder</button>
</div>

</div>

</div>
</div>

<script>

// COLORS
const colors = ["#fff176","#ffab91","#80deea","#a5d6a7","#ffcc80","#e1bee7"];

// ---------- QUESTIONS + FAQ ----------
function addQuestion(){
  let val = qInput.value;
  if(!val) return;

  let li = createItem(val, questions, true);
  qInput.value = "";
  updateFAQ();
}

function updateFAQ(){
  faq.innerHTML = "";
  [...questions.children].forEach(q=>{
    createItem(q.firstChild.textContent, faq, false);
  });
}

// ---------- CREATE LIST ITEM ----------
function createItem(text, list, isMain){
  let li = document.createElement("li");

  let span = document.createElement("span");
  span.textContent = text;

  let icons = document.createElement("div");
  icons.className="icons";
  icons.innerHTML="✏️ 💾 ❌";

  // EDIT
  icons.children[0].onclick = ()=>{
    let newText = prompt("Edit:", span.textContent);
    if(newText) span.textContent = newText;
    if(isMain) updateFAQ();
  };

  // SAVE
  icons.children[1].onclick = ()=>{
    alert("Saved: "+span.textContent);
  };

  // DELETE
  icons.children[2].onclick = ()=>{
    li.remove();
    if(isMain) updateFAQ();
  };

  li.appendChild(span);
  li.appendChild(icons);
  list.appendChild(li);
}

// ---------- NOTES WITH TOOLBAR ----------
function createNote(text, container){
  let div = document.createElement("div");
  div.className="note";
  div.style.background = colors[Math.floor(Math.random()*colors.length)];

  // TEXT AREA
  let content = document.createElement("div");
  content.contentEditable = true;
  content.innerText = text;

  // TOOLBAR
  let toolbar = document.createElement("div");
  toolbar.className="toolbar";

  toolbar.innerHTML = `
    <button onclick="document.execCommand('bold')">B</button>
    <button onclick="document.execCommand('hiliteColor',false,'yellow')">🖍</button>
    <button onclick="changeFontSize(this,1)">A+</button>
    <button onclick="changeFontSize(this,-1)">A-</button>
    <button onclick="changeColor(this)">🎨</button>
  `;

  // ICONS
  let icons = document.createElement("div");
  icons.className="icons";
  icons.style.position="absolute";
  icons.style.right="5px";
  icons.innerHTML="✏️ 💾 ❌";

  icons.children[0].onclick = ()=> content.focus();
  icons.children[1].onclick = ()=> alert("Saved!");
  icons.children[2].onclick = ()=> div.remove();

  div.appendChild(toolbar);
  div.appendChild(content);
  div.appendChild(icons);

  container.appendChild(div);
}

// FONT SIZE
function changeFontSize(btn, dir){
  let el = btn.parentElement.nextSibling;
  let size = window.getComputedStyle(el).fontSize;
  size = parseFloat(size);
  el.style.fontSize = (size + dir*2) + "px";
}

// CHANGE COLOR
function changeColor(btn){
  let note = btn.closest(".note");
  note.style.background = colors[Math.floor(Math.random()*colors.length)];
}

// ADD NOTE
function addNote(){
  if(noteInput.value){
    createNote(noteInput.value, notes);
    noteInput.value="";
  }
}

// ADD REMINDER
function addReminder(){
  if(reminderInput.value){
    createNote(reminderInput.value, reminders);
    reminderInput.value="";
  }
}

</script>
</body>
</html>
