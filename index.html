<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Appointment AI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#0a0f1f; --bg2:#05070f;
  --neon1:#8A2BE2; --neon2:#00BFFF; --danger:#ff4d6d;
  --text:#eaeaf0; --muted:#b9c0d0;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Poppins',sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 20% -10%, rgba(138,43,226,.15), transparent 60%), radial-gradient(900px 500px at 120% 10%, rgba(0,191,255,.12), transparent 60%), linear-gradient(135deg,var(--bg1),var(--bg2));}
.container{display:flex;gap:20px;padding:20px}
.main{flex:3}
.sidebar{flex:1}
.title{text-align:center;font-size:32px;margin:10px 0 20px;text-shadow:0 0 12px rgba(138,43,226,.8),0 0 24px rgba(0,191,255,.4)}
.panel{background:rgba(255,255,255,.04);border-radius:16px;padding:16px;margin-bottom:18px;border:1px solid rgba(138,43,226,.35);box-shadow:inset 0 0 0 1px rgba(255,255,255,.02), 0 0 20px rgba(0,191,255,.15)}
.panel h3{margin:0 0 10px;font-weight:600}
.input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.08);color:#fff;outline:none}
.input::placeholder{color:#cfd6e6}
.row{display:flex;gap:10px;align-items:center}
.btn{padding:8px 12px;border:none;border-radius:10px;cursor:pointer;color:#fff;background:linear-gradient(45deg,var(--neon1),var(--neon2));box-shadow:0 0 10px rgba(0,191,255,.4)}
.btn.secondary{background:rgba(255,255,255,.08);box-shadow:none}
.btn.danger{background:linear-gradient(45deg,var(--danger),#ff6b6b)}
.screenshot{height:140px;border:2px dashed var(--neon2);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.answer-main{background:rgba(0,191,255,.12);border:1px solid rgba(0,191,255,.5);padding:12px;border-radius:12px;box-shadow:0 0 16px rgba(0,191,255,.35)}
.answer-alt{margin-top:10px;display:grid;gap:8px}
.card{background:rgba(255,255,255,.05);border-left:3px solid var(--neon1);padding:10px;border-radius:10px}
.card small{color:var(--muted)}
.note{background:rgba(255,255,255,.06);border-radius:12px;padding:10px;margin-bottom:10px;border:1px solid rgba(138,43,226,.35);box-shadow:0 0 12px rgba(138,43,226,.25)}
.bottom{height:110px}
.kb-item,.qa-item{display:flex;flex-direction:column;gap:6px}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);margin:10px 0}
</style>
</head>
<body>
<div class="title">Appointment AI</div>
<div class="container">
  <div class="main">

    <!-- LIVE INPUT -->
    <div class="panel">
      <h3>Live Question Input</h3>
      <div class="row">
        <input id="liveInput" class="input" placeholder="Type or paste question here..." />
        <button class="btn secondary" id="clearBtn">Clear</button>
        <button class="btn" id="copyBtn">Copy</button>
      </div>
    </div>

    <!-- SCREENSHOT -->
    <div class="panel">
      <h3>Screenshot</h3>
      <div class="screenshot">Paste Screenshot Here</div>
    </div>

    <!-- ANSWERS -->
    <div class="panel">
      <h3>Answer</h3>
      <div id="mainAnswer" class="answer-main">Type a question to get answers...</div>
      <div id="altAnswers" class="answer-alt"></div>
    </div>

    <!-- MANUAL QA -->
    <div class="panel">
      <h3>Manual Q&A</h3>
      <input id="qInput" class="input" placeholder="Question" />
      <input id="kInput" class="input" placeholder="Keywords (comma separated)" />
      <textarea id="aInput" class="input" placeholder="Answer"></textarea>
      <button class="btn" id="addQA">Add</button>
      <div id="qaList"></div>
    </div>

    <!-- KNOWLEDGE BASE -->
    <div class="panel">
      <h3>Knowledge Base</h3>
      <input id="kbKeywords" class="input" placeholder="Keywords (comma separated)" />
      <textarea id="kbAnswer" class="input" placeholder="Answer"></textarea>
      <button class="btn" id="addKB">Add</button>
      <div id="kbList"></div>
    </div>

    <div class="bottom"></div>
  </div>

  <!-- STICKY NOTES -->
  <div class="sidebar">
    <div class="panel">
      <h3>Sticky Notes</h3>
      <textarea id="noteInput" class="input" placeholder="Write a note..."></textarea>
      <button class="btn" id="addNote">Add Note</button>
      <div id="notes"></div>
    </div>
  </div>
</div>

<script>
let qaData=[]; let kbData=[];

// Helpers
const normalize = s => (s||"").toLowerCase();
const tokenize = s => normalize(s).split(/[^a-z0-9]+/).filter(Boolean);
const scoreEntry = (tokens, keywords) => {
  let score=0;
  keywords.forEach(k=>{
    const key=normalize(k);
    tokens.forEach(t=>{ if(t.includes(key)||key.includes(t)) score++; });
  });
  return score;
};

// Render lists
function renderQA(){
  const el=document.getElementById('qaList'); el.innerHTML='';
  qaData.forEach((item,i)=>{
    const d=document.createElement('div'); d.className='card qa-item';
    d.innerHTML=`<b>${item.q}</b><small>${item.keywords.join(', ')}</small><div>${item.a}</div>
    <div class='row'>
      <button class='btn' onclick='useAnswer(${i},"qa")'>Use</button>
      <button class='btn danger' onclick='delQA(${i})'>Delete</button>
    </div>`;
    el.appendChild(d);
  });
}
function renderKB(){
  const el=document.getElementById('kbList'); el.innerHTML='';
  kbData.forEach((item,i)=>{
    const d=document.createElement('div'); d.className='card kb-item';
    d.innerHTML=`<small>${item.keywords.join(', ')}</small><div>${item.a}</div>
    <div class='row'>
      <button class='btn' onclick='useAnswer(${i},"kb")'>Use</button>
      <button class='btn danger' onclick='delKB(${i})'>Delete</button>
    </div>`;
    el.appendChild(d);
  });
}

// Add
addQA.onclick=()=>{
  const q=qInput.value.trim(); const k=kInput.value.split(',').map(x=>x.trim()).filter(Boolean); const a=aInput.value.trim();
  if(!q||!k.length||!a) return;
  qaData.push({q,keywords:k,a}); qInput.value='';kInput.value='';aInput.value=''; renderQA();
};
addKB.onclick=()=>{
  const k=kbKeywords.value.split(',').map(x=>x.trim()).filter(Boolean); const a=kbAnswer.value.trim();
  if(!k.length||!a) return;
  kbData.push({keywords:k,a}); kbKeywords.value='';kbAnswer.value=''; renderKB();
};

// Delete
function delQA(i){qaData.splice(i,1);renderQA();}
function delKB(i){kbData.splice(i,1);renderKB();}

// Use
function useAnswer(i,type){
  const a = type==='qa'? qaData[i].a : kbData[i].a;
  mainAnswer.innerText=a;
}

// Matching
let timer=null;
liveInput.addEventListener('input',()=>{
  clearTimeout(timer);
  timer=setTimeout(runMatch,300);
});

function runMatch(){
  const text=liveInput.value; if(!text){ mainAnswer.innerText='Type a question to get answers...'; altAnswers.innerHTML=''; return; }
  const tokens=tokenize(text);

  let results=[];

  qaData.forEach(item=>{
    const s=scoreEntry(tokens,item.keywords);
    if(s>0) results.push({score:s,answer:item.a,source:'qa'});
  });
  kbData.forEach(item=>{
    const s=scoreEntry(tokens,item.keywords);
    if(s>0) results.push({score:s,answer:item.a,source:'kb'});
  });

  results.sort((a,b)=>b.score-a.score);

  if(results.length===0){ mainAnswer.innerText='No strong match found'; altAnswers.innerHTML=''; return; }

  mainAnswer.innerText=results[0].answer;

  const top=results.slice(1,4);
  altAnswers.innerHTML='';
  top.forEach(r=>{
    const d=document.createElement('div'); d.className='card';
    d.innerHTML=`${r.answer}<br><button class='btn' onclick='mainAnswer.innerText="${r.answer.replace(/"/g,'\"')}"'>Use</button>`;
    altAnswers.appendChild(d);
  });
}

// Notes
addNote.onclick=()=>{
  const t=noteInput.value.trim(); if(!t) return;
  const d=document.createElement('div'); d.className='note'; d.innerText=t;
  notes.appendChild(d); noteInput.value='';
};

// Controls
clearBtn.onclick=()=>{liveInput.value=''; runMatch();};
copyBtn.onclick=()=>{navigator.clipboard.writeText(mainAnswer.innerText||'');};
</script>
</body>
</html>
