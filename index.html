<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment AI</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0a0a0a;
    color:#fff;
}

/* TITLE */
h1{
    text-align:center;
    padding:15px;
    color:#00c3ff;
}

/* LAYOUT */
.container{
    display:flex;
}

.left{
    width:75%;
    padding:15px;
}

.right{
    width:25%;
    padding:15px;
    border-left:1px solid #333;
}

/* PANELS */
.panel{
    background:#1a1a1a;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
    border:1px solid #333;
}

/* INPUT */
input, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#111;
    border:1px solid #333;
    color:#fff;
}

/* BUTTON ICONS */
.icons{
    float:right;
}

.icons i{
    margin-left:10px;
    cursor:pointer;
    color:#00c3ff;
}

.icons i:hover{
    color:#ff3b3b;
}

/* ANSWER BOX */
.answer-box{
    background:#111;
    padding:15px;
    border-left:4px solid red;
}

/* STICKY NOTES */
.note{
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    color:#000;
    font-weight:bold;
}

.yellow{background:#fff176;}
.blue{background:#81d4fa;}
.green{background:#a5d6a7;}
.pink{background:#f48fb1;}

.footer-space{
    height:100px;
}
</style>
</head>

<body>

<h1>Appointment AI</h1>

<div class="container">

<!-- LEFT SIDE -->
<div class="left">

<!-- SCREENSHOT PANEL -->
<div class="panel">
<h3>Screenshot</h3>
<input type="file" id="imgInput">
</div>

<!-- ANSWERS -->
<div class="panel">
<h3>Answers</h3>
<div class="answer-box" id="answerBox">
Answers will appear here...
</div>
</div>

<!-- MANUAL QUESTIONS -->
<div class="panel">
<h3>Add Question / Objection</h3>

<input id="questionInput" placeholder="Type question...">
<textarea id="answerInput" placeholder="Type answer..."></textarea>

<div class="icons">
<i class="fas fa-save" onclick="addQA()"></i>
<i class="fas fa-eraser" onclick="clearInputs()"></i>
</div>

</div>

<!-- KNOWLEDGE BASE -->
<div class="panel">
<h3><b>Knowledge Base</b></h3>
<div id="knowledgeList"></div>
</div>

<!-- FAQ -->
<div class="panel">
<h3>Frequently Asked</h3>
<div id="faqList"></div>
</div>

<div class="footer-space"></div>

</div>

<!-- RIGHT SIDE -->
<div class="right">

<!-- REMINDERS -->
<div class="panel">
<h3>Reminders</h3>
<textarea placeholder="Write reminders..."></textarea>
</div>

<!-- STICKY NOTES -->
<div class="panel">
<h3>Sticky Notes</h3>

<div class="note yellow" contenteditable="true">Note 1</div>
<div class="note blue" contenteditable="true">Note 2</div>
<div class="note green" contenteditable="true">Note 3</div>
<div class="note pink" contenteditable="true">Note 4</div>

</div>

</div>

</div>

<script>

/* STORAGE */
let knowledge = [];
let faq = [];

/* ADD QUESTION */
function addQA(){
    let q = document.getElementById("questionInput").value;
    let a = document.getElementById("answerInput").value;

    if(q === "" || a === "") return;

    knowledge.push({q,a});
    renderKnowledge();

    autoDetect(q);

    clearInputs();
}

/* CLEAR INPUT */
function clearInputs(){
    document.getElementById("questionInput").value="";
    document.getElementById("answerInput").value="";
}

/* RENDER KNOWLEDGE */
function renderKnowledge(){
    let list = document.getElementById("knowledgeList");
    list.innerHTML="";

    knowledge.forEach((item,index)=>{
        list.innerHTML += `
        <div class="panel">
            <b>${item.q}</b><br>${item.a}
            <div class="icons">
                <i class="fas fa-pen" onclick="editQA(${index})"></i>
                <i class="fas fa-trash" onclick="deleteQA(${index})"></i>
            </div>
        </div>`;
    });
}

/* DELETE */
function deleteQA(i){
    knowledge.splice(i,1);
    renderKnowledge();
}

/* EDIT */
function editQA(i){
    document.getElementById("questionInput").value = knowledge[i].q;
    document.getElementById("answerInput").value = knowledge[i].a;
}

/* AUTO ANSWER DETECT */
function autoDetect(input){
    let answerBox = document.getElementById("answerBox");

    let found = knowledge.find(item => 
        input.toLowerCase().includes(item.q.toLowerCase())
    );

    if(found){
        answerBox.innerHTML = found.a;

        faq.push(found);
        renderFAQ();
    }
}

/* FAQ */
function renderFAQ(){
    let list = document.getElementById("faqList");
    list.innerHTML="";

    faq.forEach((item,index)=>{
        list.innerHTML += `
        <div class="panel">
            <b>${item.q}</b><br>${item.a}
            <div class="icons">
                <i class="fas fa-trash" onclick="removeFAQ(${index})"></i>
            </div>
        </div>`;
    });
}

/* REMOVE FAQ */
function removeFAQ(i){
    faq.splice(i,1);
    renderFAQ();
}

</script>

</body>
</html>
