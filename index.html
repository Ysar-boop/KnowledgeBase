<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Panels with Blue Background</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, sans-serif;
    display: flex;
    height: 100vh;
    background: #1e3a8a; /* Old blue background */
    color: #fff;
  }
  .panel {
    padding: 15px;
    box-sizing: border-box;
    overflow-y: auto;
    border-right: 1px solid rgba(255,255,255,0.2);
  }
  #leftPanel { width: 60%; }
  #rightPanel { width: 40%; }
  .section {
    background: rgba(255,255,255,0.1);
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }
  button {
    margin: 3px;
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 500;
    background: #2563eb;
    color: #fff;
  }
  input, textarea {
    width: calc(100% - 20px);
    margin-bottom: 5px;
    padding: 5px;
    font-family: inherit;
    font-size: 14px;
    border-radius: 5px;
    border: none;
  }
  h3 {
    margin: 5px 0;
    font-size: 16px;
  }
  .sticky-note {
    width: 150px;
    min-width: 100px;
    min-height: 100px;
    max-width: 300px;
    max-height: 300px;
    padding: 8px;
    margin: 5px;
    background: #facc15; /* Yellow sticky note */
    border-radius: 6px;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    cursor: move;
    overflow: auto;
    resize: both;
    color: #000;
  }
  .sticky-container {
    display: flex;
    flex-wrap: wrap;
  }
</style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="panel" id="leftPanel">
  <!-- Screenshot -->
  <div class="section">
    <button id="screenshotBtn">Take Screenshot</button>
  </div>

  <!-- Manual Questions -->
  <div class="section">
    <h3>Manual Questions / Objections</h3>
    <input type="text" id="manualQuestion" placeholder="Enter question or objection">
    <input type="text" id="manualAnswer" placeholder="Enter answer">
    <button onclick="addQuestion()">Add / Save</button>
  </div>

  <!-- Automatic Answers -->
  <div class="section">
    <h3>Automatic Answers</h3>
    <div id="autoAnswers" class="sticky-container"></div>
  </div>

  <!-- Options -->
  <div class="section">
    <h3>Options</h3>
    <button onclick="clearQuestions()">Clear All Questions</button>
  </div>

  <!-- Knowledge Base -->
  <div class="section">
    <h3>Knowledge Base</h3>
    <div id="knowledgeBase" class="sticky-container"></div>
  </div>

  <!-- Pre-Questions / Answers -->
  <div class="section">
    <h3>Pre-Questions / Answers</h3>
    <div id="preQA" class="sticky-container"></div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="panel" id="rightPanel">
  <!-- Reminders -->
  <div class="section">
    <h3>Reminders</h3>
    <input type="text" id="reminderInput" placeholder="Enter reminder">
    <button onclick="addReminder()">Add Reminder</button>
    <div id="reminderNotes" class="sticky-container"></div>
  </div>

  <!-- Sticky Notes -->
  <div class="section">
    <h3>Sticky Notes</h3>
    <button onclick="createSticky('stickyNotes')">Add Note</button>
    <div id="stickyNotes" class="sticky-container"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  // --- Sticky Note Utility ---
  function makeSticky(containerId, content='', color='#facc15') {
    const container = document.getElementById(containerId);
    const note = document.createElement('div');
    note.className = 'sticky-note';
    note.contentEditable = true;
    note.style.background = color;
    note.innerText = content;
    note.onmousedown = dragMouseDown;
    container.appendChild(note);

    note.oncontextmenu = (e) => {
      e.preventDefault();
      container.removeChild(note);
      saveAll();
    }

    note.onblur = saveAll;
    return note;
  }

  function createSticky(containerId) {
    makeSticky(containerId, 'New Note');
    saveAll();
  }

  // --- Drag & Drop ---
  let offsetX, offsetY, currentNote;
  function dragMouseDown(e) {
    if (!e.target.classList.contains('sticky-note')) return;
    currentNote = e.target;
    offsetX = e.clientX - currentNote.offsetLeft;
    offsetY = e.clientY - currentNote.offsetTop;
    document.onmousemove = elementDrag;
    document.onmouseup = stopDrag;
  }
  function elementDrag(e) {
    e.preventDefault();
    currentNote.style.position = 'absolute';
    currentNote.style.left = (e.clientX - offsetX) + 'px';
    currentNote.style.top = (e.clientY - offsetY) + 'px';
  }
  function stopDrag() {
    document.onmousemove = null;
    document.onmouseup = null;
    saveAll();
  }

  // --- LEFT PANEL FUNCTIONALITY ---
  let questions = [];
  function addQuestion() {
    const qInput = document.getElementById('manualQuestion');
    const aInput = document.getElementById('manualAnswer');
    if (!qInput.value) return alert('Question required');
    const qa = { q: qInput.value, a: aInput.value };
    questions.push(qa);
    updateKnowledgeBase();
    updatePreQA();
    qInput.value=''; aInput.value='';
    saveAll();
  }

  function updateKnowledgeBase() {
    const kb = document.getElementById('knowledgeBase');
    kb.innerHTML='';
    questions.forEach(qa=>{
      makeSticky('knowledgeBase', `Q: ${qa.q}\nA: ${qa.a}`);
    });
  }

  function updatePreQA() {
    const pre = document.getElementById('preQA');
    pre.innerHTML='';
    questions.forEach(qa=>{
      makeSticky('preQA', `Q: ${qa.q}\nA: ${qa.a}`);
    });
  }

  function clearQuestions() {
    questions=[];
    document.getElementById('knowledgeBase').innerHTML='';
    document.getElementById('preQA').innerHTML='';
    saveAll();
  }

  // Automatic Answers
  function updateAutoAnswers() {
    const auto = document.getElementById('autoAnswers');
    auto.innerHTML='';
    if (questions.length>0) {
      makeSticky('autoAnswers', questions[questions.length-1].a || 'No answer yet');
    }
  }
  setInterval(updateAutoAnswers,1000);

  // --- RIGHT PANEL FUNCTIONALITY ---
  function addReminder() {
    const input = document.getElementById('reminderInput');
    if(!input.value) return;
    makeSticky('reminderNotes', input.value, '#34d399');
    input.value='';
    saveAll();
  }

  // --- Screenshot ---
  document.getElementById('screenshotBtn').onclick = function(){
    html2canvas(document.getElementById('leftPanel')).then(canvas=>{
      const link = document.createElement('a');
      link.download = 'leftPanel.png';
      link.href = canvas.toDataURL();
      link.click();
    });
  }

  // --- AUTOSAVE & LOAD ---
  function saveAll() {
    localStorage.setItem('questions', JSON.stringify(questions));
    const stickyIds = ['stickyNotes','reminderNotes','knowledgeBase','preQA','autoAnswers'];
    stickyIds.forEach(id=>{
      const notes = Array.from(document.getElementById(id).children).map(n=>({
        content: n.innerText,
        color: n.style.background,
        left: n.style.left,
        top: n.style.top
      }));
      localStorage.setItem(id, JSON.stringify(notes));
    });
  }

  function loadAll() {
    const savedQ = JSON.parse(localStorage.getItem('questions') || '[]');
    if(savedQ.length) {
      questions = savedQ;
      updateKnowledgeBase();
      updatePreQA();
    }
    const stickyIds = ['stickyNotes','reminderNotes','knowledgeBase','preQA','autoAnswers'];
    stickyIds.forEach(id=>{
      const savedNotes = JSON.parse(localStorage.getItem(id) || '[]');
      savedNotes.forEach(n=>{
        const note = makeSticky(id, n.content, n.color);
        if(n.left) note.style.left = n.left;
        if(n.top) note.style.top = n.top;
        note.style.position = (n.left && n.top) ? 'absolute':'';
      });
    });
  }

  window.onload = loadAll;
</script>
</body>
</html>
