<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment AI</title>
<style>
body {
  margin:0;
  font-family:Segoe UI;
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color:white;
}

/* HEADER */
h1{
  text-align:center;
  color:#ff2a2a;
  text-shadow:0 0 15px red;
  margin:15px;
}

/* LAYOUT */
.container{
  display:flex;
  gap:15px;
  padding:15px;
}

/* PANELS */
.panel{
  background:rgba(20,20,20,0.85);
  border:1px solid rgba(255,0,0,0.3);
  box-shadow:0 0 10px rgba(0,150,255,0.3);
  border-radius:10px;
  padding:10px;
  margin-bottom:15px;
}

/* LEFT */
.left{
  flex:2;
}

/* RIGHT */
.right{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:15px;
  max-height:90vh;
  overflow:auto;
}

/* INPUT */
input, textarea{
  width:100%;
  margin:5px 0;
  padding:8px;
  background:#111;
  color:white;
  border:1px solid #333;
}

/* BUTTON */
button{
  background:#111;
  border:1px solid red;
  color:white;
  padding:6px 10px;
  cursor:pointer;
}

/* LIST ITEMS */
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  padding:6px;
  margin-top:5px;
}

.icons{
  display:flex;
  gap:8px;
  cursor:pointer;
}

/* SCREENSHOT */
img{
  max-width:100%;
  border-radius:5px;
}

/* STICKY */
.note{
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  color:black;
}

.note-header{
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  font-weight:bold;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<h1>Appointment AI</h1>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="panel">
<h3>Screenshot</h3>
<input type="file" accept="image/*" onchange="loadImage(event)">
<img id="preview">
</div>

<div class="panel">
<h3>Answer</h3>
<div id="answerBox"></div>
</div>

<div class="panel">
<h3>Manual Add (Q / Objection / Answer)</h3>
<input id="q" placeholder="Question / Objection">
<input id="a" placeholder="Answer">
<button onclick="addQA()">Add</button>
<div id="qaList"></div>
</div>

<div class="panel">
<h3><b>Knowledge Base</b></h3>
<div id="kbList"></div>
</div>

<div class="panel">
<h3>Frequently Asked</h3>
<div id="faqList"></div>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="panel">
<h3>Sticky Notes</h3>
<input id="noteInput" placeholder="Write note">
<button onclick="addNote()">Add</button>
<div id="notes"></div>
</div>

<div class="panel">
<h3>Reminders</h3>
<input id="remInput" placeholder="Write reminder">
<button onclick="addReminder()">Add</button>
<div id="reminders"></div>
</div>

</div>

</div>

<script>

let data = [];

/* SCREENSHOT */
function loadImage(e){
  let img = document.getElementById('preview');
  img.src = URL.createObjectURL(e.target.files[0]);
}

/* ADD QA */
function addQA(){
  let q = document.getElementById('q').value;
  let a = document.getElementById('a').value;

  if(!q || !a) return;

  let obj = {q,a};
  data.push(obj);

  renderQA();
  renderKB();
  renderFAQ();

  document.getElementById('q').value="";
  document.getElementById('a').value="";
}

/* RENDER QA */
function renderQA(){
  let list = document.getElementById('qaList');
  list.innerHTML="";

  data.forEach((item,i)=>{
    list.innerHTML += createItem(item.q + " → " + item.a, i);
  });
}

/* KNOWLEDGE BASE */
function renderKB(){
  let kb = document.getElementById('kbList');
  kb.innerHTML="";

  data.forEach((item,i)=>{
    kb.innerHTML += createItem(item.q + " → " + item.a, i);
  });
}

/* FAQ AUTO */
function renderFAQ(){
  let faq = document.getElementById('faqList');
  faq.innerHTML="";

  data.forEach((item,i)=>{
    faq.innerHTML += createItem(item.q, i);
  });
}

/* ITEM TEMPLATE */
function createItem(text, index){
  return `
  <div class="item">
    <span contenteditable="true">${text}</span>
    <div class="icons">
      <span onclick="editItem(this)">✏️</span>
      <span onclick="saveItem(${index}, this)">💾</span>
      <span onclick="deleteItem(${index})">🗑</span>
    </div>
  </div>`;
}

/* ICON FUNCTIONS */
function editItem(el){
  el.parentElement.parentElement.querySelector("span").focus();
}

function saveItem(i, el){
  let text = el.parentElement.parentElement.querySelector("span").innerText;
  let parts = text.split("→");
  if(parts.length>=2){
    data[i] = {q:parts[0].trim(), a:parts[1].trim()};
    renderQA(); renderKB(); renderFAQ();
  }
}

function deleteItem(i){
  data.splice(i,1);
  renderQA(); renderKB(); renderFAQ();
}

/* STICKY */
const colors = ["#ffd54f","#4fc3f7","#ff8a80","#81c784"];

function addNote(){
  let text = document.getElementById("noteInput").value;
  if(!text) return;

  let color = colors[Math.floor(Math.random()*colors.length)];

  let div = document.createElement("div");
  div.className="note";
  div.style.background=color;

  div.innerHTML = `
  <div class="note-header" onclick="toggleNote(this)">
    Note
    <div class="icons">
      <span onclick="event.stopPropagation(); deleteNote(this)">🗑</span>
    </div>
  </div>
  <div contenteditable="true">${text}</div>
  `;

  document.getElementById("notes").appendChild(div);
  document.getElementById("noteInput").value="";
}

/* REMINDER */
function addReminder(){
  let text = document.getElementById("remInput").value;
  if(!text) return;

  let div = document.createElement("div");
  div.className="note";
  div.style.background="#90caf9";

  div.innerHTML = `
  <div class="note-header" onclick="toggleNote(this)">
    Reminder
    <div class="icons">
      <span onclick="event.stopPropagation(); deleteNote(this)">🗑</span>
    </div>
  </div>
  <div contenteditable="true">${text}</div>
  `;

  document.getElementById("reminders").appendChild(div);
  document.getElementById("remInput").value="";
}

/* COLLAPSE */
function toggleNote(el){
  let content = el.parentElement.children[1];
  content.classList.toggle("hidden");
}

/* DELETE NOTE */
function deleteNote(el){
  el.closest(".note").remove();
}

</script>

</body>
</html>
