<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Appointment AI</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background: linear-gradient(135deg,#050a1f,#000,#1a0a0a);
  color:white;
}

/* HEADER */
h1{
  text-align:center;
  color:#ff2a2a;
  text-shadow:0 0 20px red,0 0 40px blue;
  margin:15px 0;
}

/* LAYOUT */
.container{
  display:flex;
  gap:20px;
  padding:20px;
}

.left{flex:2;}
.right{flex:1;}

/* PANELS */
.panel{
  background:rgba(15,15,25,0.9);
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 0 15px rgba(0,150,255,0.3);
}

/* INPUTS */
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#111;
  color:white;
  border:1px solid #333;
  border-radius:5px;
}

/* BUTTON */
button{
  background:#111;
  border:1px solid red;
  color:white;
  padding:6px;
  cursor:pointer;
  margin-top:5px;
}

/* QA ITEMS */
.item{
  display:flex;
  justify-content:space-between;
  background:#111;
  padding:8px;
  margin-top:8px;
  border-radius:6px;
}

.icons span{
  margin-left:10px;
  cursor:pointer;
}

/* ANSWER */
#answer{
  background:#111;
  padding:10px;
  border-radius:6px;
  min-height:50px;
}

/* NOTES */
.note{
  background:#ffd54f;
  color:black;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.note-header{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  cursor:pointer;
}

.hidden{display:none;}

/* KNOWLEDGE BASE */
.kb{
  font-size:22px;
  color:#4fc3f7;
  text-shadow:0 0 10px cyan,0 0 20px blue;
  margin:20px 0 10px;
}
</style>
</head>

<body>

<h1>Appointment AI</h1>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="panel">
<h3>Screenshot Panel</h3>
<button onclick="toggle('ss')">Toggle</button>
<div id="ss">
<input type="file" id="imgInput">
<div id="imgs"></div>
</div>
</div>

<div class="panel">
<h3>Answer</h3>
<div id="answer"></div>
</div>

<div class="panel">
<h3>Manual Add (Q / Objection / Answer)</h3>
<input id="q" placeholder="Question / Objection">
<input id="a" placeholder="Answer">
<button onclick="addQA()">Add</button>
<div id="list"></div>
</div>

<div class="kb">Knowledge Base</div>

<div class="panel">
<h3>Frequently Asked Questions</h3>
<div id="faq"></div>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="panel">
<h3>Sticky Notes / Reminders</h3>
<input id="noteInput" placeholder="Type and press ENTER">
<div id="notes"></div>
</div>

</div>

</div>

<script>

let data={qa:[],notes:[]};

/* QA */
function addQA(){
  let q=document.getElementById('q').value;
  let a=document.getElementById('a').value;
  if(!q||!a)return;

  data.qa.push({q,a});
  renderQA();
  renderFAQ();

  document.getElementById('q').value="";
  document.getElementById('a').value="";
}

function renderQA(){
  let el=document.getElementById('list');
  el.innerHTML="";
  data.qa.forEach((x,i)=>{
    el.innerHTML+=`
    <div class="item" onclick="show(${i})">
      <span contenteditable>${x.q} → ${x.a}</span>
      <div class="icons">
        <span onclick="event.stopPropagation();edit(this)">✏️</span>
        <span onclick="event.stopPropagation();save(${i},this)">💾</span>
        <span onclick="event.stopPropagation();del(${i})">🗑</span>
      </div>
    </div>`;
  });
}

function renderFAQ(){
  let el=document.getElementById('faq');
  el.innerHTML="";
  data.qa.forEach((x,i)=>{
    el.innerHTML+=`
    <div class="item">
      <span contenteditable>${x.q}</span>
      <div class="icons">
        <span onclick="edit(this)">✏️</span>
        <span onclick="save(${i},this)">💾</span>
        <span onclick="del(${i})">🗑</span>
      </div>
    </div>`;
  });
}

function show(i){
  document.getElementById('answer').innerText=data.qa[i].a;
}

function edit(e){
  e.parentElement.parentElement.querySelector("span").focus();
}

function save(i,e){
  let txt=e.parentElement.parentElement.querySelector("span").innerText;
  let parts=txt.split("→");
  if(parts.length>=2){
    data.qa[i]={q:parts[0].trim(),a:parts[1].trim()};
  }
  renderQA();
  renderFAQ();
}

function del(i){
  data.qa.splice(i,1);
  renderQA();
  renderFAQ();
}

/* NOTES */
document.getElementById("noteInput").addEventListener("keypress",function(e){
  if(e.key==="Enter"){
    let val=this.value.trim();
    if(!val)return;
    data.notes.push(val);
    this.value="";
    renderNotes();
  }
});

function renderNotes(){
  let el=document.getElementById('notes');
  el.innerHTML="";
  data.notes.forEach((n,i)=>{
    el.innerHTML+=`
    <div class="note">
      <div class="note-header">
        <span onclick="toggleNote(this)">Note</span>
        <div class="icons">
          <span onclick="editNote(this)">✏️</span>
          <span onclick="saveNote(${i},this)">💾</span>
          <span onclick="delNote(${i})">🗑</span>
        </div>
      </div>
      <div contenteditable>${n}</div>
    </div>`;
  });
}

function toggleNote(e){
  e.parentElement.parentElement.querySelector("div[contenteditable]").classList.toggle("hidden");
}

function editNote(e){
  e.parentElement.parentElement.nextElementSibling.focus();
}

function saveNote(i,e){
  let txt=e.parentElement.parentElement.nextElementSibling.innerText;
  data.notes[i]=txt;
}

function delNote(i){
  data.notes.splice(i,1);
  renderNotes();
}

/* SCREENSHOT */
function toggle(id){
  document.getElementById(id).classList.toggle("hidden");
}

document.getElementById("imgInput").addEventListener("change",e=>{
  let file=e.target.files[0];
  if(!file)return;
  let url=URL.createObjectURL(file);
  let img=document.createElement("img");
  img.src=url;
  img.style.width="100%";
  img.style.marginTop="10px";
  document.getElementById("imgs").appendChild(img);
});

</script>

</body>
</html>
