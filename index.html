<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointment AI</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0a0f1f, #000);
  color: white;
}

h1 {
  text-align:center;
  color:#00d4ff;
  text-shadow:0 0 10px #00d4ff;
}

.container {
  display:flex;
  height:100vh;
}

/* LEFT PANEL */
.left {
  width:70%;
  padding:15px;
  overflow:auto;
}

/* RIGHT PANEL */
.right {
  width:30%;
  background:#111;
  padding:10px;
  overflow:auto;
  border-left:2px solid #00d4ff;
}

/* PANELS */
.panel {
  background:rgba(255,255,255,0.05);
  margin-bottom:15px;
  padding:10px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,212,255,0.2);
}

/* BUTTON */
button {
  background:#00d4ff;
  border:none;
  padding:5px 10px;
  margin-top:5px;
  cursor:pointer;
  border-radius:5px;
}

/* EDITOR */
.editor {
  min-height:50px;
  padding:5px;
  background:#000;
  border:1px solid #333;
  margin-top:5px;
}

/* TOOLBAR */
.toolbar button {
  background:#222;
  color:white;
  margin-right:5px;
}

/* CARD */
.card {
  background:#111;
  padding:10px;
  margin-top:10px;
  border-left:3px solid #00d4ff;
  position:relative;
}

/* ICONS RIGHT */
.icons {
  position:absolute;
  right:5px;
  top:5px;
}

.icons span {
  cursor:pointer;
  margin-left:8px;
}
</style>
</head>

<body>

<h1>Appointment AI</h1>

<div class="container">

<!-- LEFT -->
<div class="left">

<div class="panel">
<h3>Screenshot Input</h3>
<textarea id="screenshotInput" style="width:100%;height:80px;"></textarea>
<button onclick="processText()">Analyze</button>
</div>

<div class="panel">
<h3>Answer</h3>
<div id="answerOutput"></div>
</div>

<div class="panel">
<h3>Manual Add (Q / Objection / Answer)</h3>

<div class="toolbar">
<button onclick="format('bold')">B</button>
<button onclick="format('italic')">I</button>
<button onclick="format('underline')">U</button>
</div>

<div id="q" class="editor" contenteditable="true">Question</div>
<div id="o" class="editor" contenteditable="true">Objection</div>
<div id="a" class="editor" contenteditable="true">Answer</div>

<button onclick="addEntry()">Add</button>

<div id="entries"></div>
</div>

<h2>Knowledge Base</h2>

<div class="panel" id="faqPanel">
<h3>Frequently Asked</h3>
<div id="faq"></div>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="panel">
<h3>Notes / Reminders</h3>
<div class="toolbar">
<button onclick="format('bold')">B</button>
<button onclick="format('italic')">I</button>
</div>

<div id="noteInput" class="editor" contenteditable="true"></div>
<button onclick="addNote()">Add Note</button>

<div id="notes"></div>
</div>

</div>

</div>

<script>

let db = [];

function format(cmd){
 document.execCommand(cmd,false,null);
}

function addEntry(){
 let q = document.getElementById('q').innerHTML;
 let o = document.getElementById('o').innerHTML;
 let a = document.getElementById('a').innerHTML;

 let entry = {q,o,a};
 db.push(entry);
 renderEntries();
 autoFAQ(entry);

 document.getElementById('q').innerHTML='';
 document.getElementById('o').innerHTML='';
 document.getElementById('a').innerHTML='';
}

function renderEntries(){
 let html='';
 db.forEach((e,i)=>{
  html+=`
  <div class="card">
  <div class="icons">
  <span onclick="deleteEntry(${i})">🗑</span>
  </div>
  <b>Q:</b>${e.q}<br>
  <b>O:</b>${e.o}<br>
  <b>A:</b>${e.a}
  </div>`;
 });
 document.getElementById('entries').innerHTML=html;
}

function deleteEntry(i){
 db.splice(i,1);
 renderEntries();
}

function processText(){
 let input = document.getElementById('screenshotInput').value.toLowerCase();

 let found = db.find(e=> input.includes(e.q.toLowerCase()));

 if(found){
  document.getElementById('answerOutput').innerHTML=found.a;
 }else{
  document.getElementById('answerOutput').innerHTML="No match found";
 }
}

function autoFAQ(entry){
 let faq = document.getElementById('faq');
 faq.innerHTML += `<div class="card">${entry.q}<br>${entry.a}</div>`;
}

/* NOTES */

function addNote(){
 let text = document.getElementById('noteInput').innerHTML;

 let note = document.createElement('div');
 note.className='card';
 note.innerHTML = `
 <div class="icons">
 <span onclick="this.parentElement.parentElement.remove()">🗑</span>
 </div>
 ${text}
 `;

 document.getElementById('notes').appendChild(note);
 document.getElementById('noteInput').innerHTML='';
}

</script>

</body>
</html>
