<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Q&A Tool</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: white;
  padding: 20px;
}

.panel {
  border: 1px solid rgba(120, 80, 255, 0.5);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  background: rgba(20, 25, 40, 0.6);
  box-shadow: 0 0 20px rgba(120, 80, 255, 0.2);
}

input, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

button {
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #6a5cff, #00cfff);
  color: white;
  cursor: pointer;
}

.output {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="panel">
  <h3>Manual Q&A</h3>
  <input id="question" placeholder="Question">
  <input id="keywords" placeholder="Keywords (comma separated)">
  <textarea id="answer" placeholder="Answer"></textarea>
  <button id="addQA">Add</button>
